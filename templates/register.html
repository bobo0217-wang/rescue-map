<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>註冊 — 浪浪救援</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🐾</div>
    <h1 class="auth-title">建立帳號</h1>
    <p class="auth-subtitle">加入浪浪救援，一起幫助流浪動物</p>

    <div id="err-msg" class="alert alert-error" style="display:none"></div>
    <div id="ok-msg"  class="alert alert-ok"    style="display:none"></div>

    <div class="form-group">
      <label>使用者名稱</label>
      <input type="text" id="username" placeholder="您的暱稱" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>密碼 <span style="color:#aaa;font-size:12px;">（至少 6 個字元）</span></label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="btn-primary full" id="btn-register">建立帳號</button>

    <div class="divider">或</div>

    <a href="/auth/line" class="btn-line full">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" width="20" alt="LINE">
      使用 LINE 註冊 / 登入
    </a>

    <p class="auth-footer">已有帳號？<a href="/login">前往登入</a></p>
  </div>
</div>

<script src="/static/js/auth.js"></script>
</body>
</html>
