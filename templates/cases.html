{% extends "base.html" %}
{% block title %}個案清單 — 浪浪救援{% endblock %}
{% block content %}
<div class="page-header">
  <h1>個案清單</h1>
  <div class="filters">
    <select id="filter-status">
      <option value="">全部狀態</option>
      <option value="open">待處理</option>
      <option value="handled">已處理</option>
    </select>
    <select id="filter-animal">
      <option value="">全部動物</option>
      <option value="狗">狗</option>
      <option value="貓">貓</option>
      <option value="不明">不明</option>
    </select>
    <select id="filter-source">
      <option value="">全部來源</option>
      <option value="user">使用者回報</option>
      <option value="ptt">PTT</option>
      <option value="moa">農業部</option>
    </select>
  </div>
</div>

<div id="cases-grid" class="cases-grid">
  <div class="loading-spinner">載入中...</div>
</div>

<!-- 個案詳情 Modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>
{% endblock %}
{% block scripts %}<script src="/static/js/cases.js"></script>{% endblock %}
